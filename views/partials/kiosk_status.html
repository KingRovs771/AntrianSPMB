<!--
    File: views/partials/kiosk_status.html
    Menampilkan info antrian aktif dan jumlah antrean menunggu per ruangan
-->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white/60 backdrop-blur-md border border-white/80 rounded-3xl p-6 shadow-xl text-center">
  <!-- Ruang Informasi -->
  <div class="flex flex-col items-center p-4 rounded-2xl hover:bg-blue-50/40 transition-colors">
    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center mb-2">
      <span class="text-blue-700 font-black text-xs">I</span>
    </div>
    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Ruang Informasi</span>
    <span class="text-3xl font-black text-blue-700 mt-2">{{ .InfoActive }}</span>
    <span class="text-xs font-semibold text-slate-400 mt-1">Antrean: <strong class="text-slate-600 font-bold">{{ .InfoWaiting }}</strong> orang</span>
  </div>
  
  <!-- Divider Vertikal / Horisontal -->
  <div class="hidden md:block w-px bg-slate-200 self-stretch my-2"></div>
  <div class="block md:hidden h-px bg-slate-200 w-full my-1"></div>
  
  <!-- Ruang Pembuatan Akun -->
  <div class="flex flex-col items-center p-4 rounded-2xl hover:bg-violet-50/40 transition-colors">
    <div class="w-8 h-8 rounded-lg bg-violet-100 flex items-center justify-center mb-2">
      <span class="text-violet-700 font-black text-xs">A</span>
    </div>
    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Pembuatan Akun</span>
    <span class="text-3xl font-black text-violet-700 mt-2">{{ .AccountActive }}</span>
    <span class="text-xs font-semibold text-slate-400 mt-1">Antrean: <strong class="text-slate-600 font-bold">{{ .AccountWaiting }}</strong> orang</span>
  </div>

  <!-- Divider Vertikal / Horisontal -->
  <div class="hidden md:block w-px bg-slate-200 self-stretch my-2"></div>
  <div class="block md:hidden h-px bg-slate-200 w-full my-1"></div>

  <!-- Ruang Input & Verifikasi -->
  <div class="flex flex-col items-center p-4 rounded-2xl hover:bg-emerald-50/40 transition-colors">
    <div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center mb-2">
      <span class="text-emerald-700 font-black text-xs">D</span>
    </div>
    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Pendaftaran Sekolah</span>
    <span class="text-3xl font-black text-emerald-700 mt-2">{{ .InputActive }}</span>
    <span class="text-xs font-semibold text-slate-400 mt-1">Antrean: <strong class="text-slate-600 font-bold">{{ .InputWaiting }}</strong> orang</span>
  </div>
</div>
