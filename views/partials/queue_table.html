<!--
    File: views/partials/queue_table.html
    Data yang diharapkan dari Go Fiber:
    - .QueueList: Slice/Array of models.Queue (Daftar antrian yang statusnya WAITING)
-->
{{ range .QueueList }}
<tr class="group hover:bg-blue-50/40 transition-all duration-200 border-b border-slate-100 last:border-0">
  <!-- Nomor Antrian -->
  <td class="py-4 px-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-blue-50 border border-blue-100 flex items-center justify-center shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
      </div>
      <span class="text-xl font-black text-slate-800 tracking-tight">{{ .QueueNumber }}</span>
    </div>
  </td>

  <!-- Status -->
  <td class="py-4 px-6">
    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-700 border border-amber-200">
      <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
      Menunggu
    </span>
  </td>

  <!-- Waktu Tiba -->
  <td class="py-4 px-6">
    <div class="text-sm text-slate-500 font-semibold">{{ .UpdatedAt.Format "15:04" }} <span class="text-xs font-normal text-slate-400">WIB</span></div>
  </td>

  <!-- Aksi -->
  <td class="py-4 px-6 text-right">
    <button
      hx-post="/api/queue/skip/{{ .ID }}"
      hx-confirm="Yakin ingin melewati antrian {{ .QueueNumber }} karena murid tidak hadir?"
      class="text-xs font-bold text-slate-300 group-hover:text-rose-500 bg-transparent group-hover:bg-rose-50 px-3 py-1.5 rounded-lg transition-all duration-200 border border-transparent group-hover:border-rose-100 opacity-0 group-hover:opacity-100 focus:opacity-100"
    >
      ✕ Lewati
    </button>
  </td>
</tr>
{{ else }}
<!-- Tampilan jika antrian kosong -->
<tr>
  <td colspan="4" class="py-24 text-center">
    <div class="flex flex-col items-center justify-center gap-3">
      <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center border-2 border-dashed border-slate-200 mb-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <h3 class="text-slate-600 font-bold text-lg">Antrian Bersih</h3>
      <p class="text-slate-400 text-sm max-w-[200px]">Belum ada murid yang menunggu di ruangan ini saat ini.</p>
    </div>
  </td>
</tr>
{{ end }}
