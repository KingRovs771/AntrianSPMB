{{ range . }}
<tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors group">
    <td class="px-6 py-4">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold text-xs">
                {{ slice .FullName 0 1 }}
            </div>
            <span class="text-sm font-semibold text-slate-700">{{ .FullName }}</span>
        </div>
    </td>
    <td class="px-6 py-4 text-sm text-slate-600 font-mono">{{ .Username }}</td>
    <td class="px-6 py-4">
        <span class="px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold rounded-md border border-indigo-100">
            {{ .Role }}
        </span>
    </td>
    <td class="px-6 py-4 text-right">
        <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button
                onclick="openEditModal('{{ .ID }}', '{{ .FullName }}', '{{ .Username }}', '{{ .Role }}')"
                class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all"
                title="Edit petugas"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>
            <button
                hx-delete="/admin/users/{{ .ID }}"
                hx-confirm="Hapus user {{ .FullName }}?"
                hx-target="#user-table-body"
                hx-swap="innerHTML"
                class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all"
                title="Hapus petugas"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </td>
</tr>
{{ end }}
