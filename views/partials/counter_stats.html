<!-- Menunggu -->
<div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center gap-4">
    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </div>
    <div>
        <p class="text-xs font-bold text-blue-500 uppercase tracking-wider">Menunggu</p>
        <p class="text-2xl font-black text-blue-700">{{ .WaitingCount }}</p>
    </div>
</div>

<!-- Total Hari Ini -->
<div class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl flex items-center gap-4">
    <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
    </div>
    <div>
        <p class="text-xs font-bold text-indigo-500 uppercase tracking-wider">Total Hari Ini</p>
        <p class="text-2xl font-black text-indigo-700">{{ .TotalToday }}</p>
    </div>
</div>
