<!--
    File: views/partials/counter_stats.html
    Data yang diharapkan dari Go Fiber:
    - .WaitingCount : int64 (jumlah yang sedang menunggu di ruangan ini)
    - .TotalToday   : int64 (total yang sudah masuk ruangan ini hari ini)
-->

<!-- Menunggu -->
<div class="relative overflow-hidden bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl p-5 shadow-lg shadow-blue-200 text-white">
    <div class="absolute -right-4 -top-4 w-20 h-20 bg-white/10 rounded-full"></div>
    <div class="absolute -right-2 -bottom-6 w-16 h-16 bg-white/5 rounded-full"></div>
    <div class="relative">
        <div class="flex items-center gap-2 mb-3">
            <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <p class="text-[11px] font-bold uppercase tracking-widest text-blue-100">Menunggu</p>
        </div>
        <p class="text-4xl font-black leading-none mb-1">{{ .WaitingCount }}</p>
        <p class="text-blue-200 text-xs font-medium">antrian aktif</p>
    </div>
</div>

<!-- Total Hari Ini -->
<div class="relative overflow-hidden bg-gradient-to-br from-violet-500 to-indigo-700 rounded-2xl p-5 shadow-lg shadow-violet-200 text-white">
    <div class="absolute -right-4 -top-4 w-20 h-20 bg-white/10 rounded-full"></div>
    <div class="absolute -right-2 -bottom-6 w-16 h-16 bg-white/5 rounded-full"></div>
    <div class="relative">
        <div class="flex items-center gap-2 mb-3">
            <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </div>
            <p class="text-[11px] font-bold uppercase tracking-widest text-violet-100">Hari Ini</p>
        </div>
        <p class="text-4xl font-black leading-none mb-1">{{ .TotalToday }}</p>
        <p class="text-violet-200 text-xs font-medium">total dilayani</p>
    </div>
</div>
