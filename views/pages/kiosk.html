<!--
    File: views/pages/kiosk.html
    Halaman Kiosk — Touchscreen untuk mengambil nomor antrian

<style>
  @keyframes float {

    0%,
    100% {
      transform: translateY(0px);
    }

    50% {
      transform: translateY(-12px);
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(24px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shimmer {
    0% {
      background-position: -200% center;
    }

    100% {
      background-position: 200% center;
    }
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateX(-20px);
    }

    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .float-anim {
    animation: float 4s ease-in-out infinite;
  }

  .fade-up-1 {
    animation: fadeInUp 0.6s ease-out 0.1s both;
  }

  .fade-up-2 {
    animation: fadeInUp 0.6s ease-out 0.25s both;
  }

  .fade-up-3 {
    animation: fadeInUp 0.6s ease-out 0.4s both;
  }

  .slide-in-1 {
    animation: slideIn 0.5s ease-out 0.5s both;
  }

  .slide-in-2 {
    animation: slideIn 0.5s ease-out 0.65s both;
  }

  .slide-in-3 {
    animation: slideIn 0.5s ease-out 0.8s both;
  }

  .shimmer-btn {
    background: linear-gradient(110deg, #2563eb 40%, #60a5fa 50%, #2563eb 60%);
    background-size: 200% 100%;
    animation: shimmer 2.5s linear infinite;
  }

  /* Modal animasi */
  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  @keyframes slideUpFade {
    from {
      opacity: 0;
      transform: translateY(30px) scale(0.95);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .animate-fade-in {
    animation: fadeIn 0.3s ease-out forwards;
  }

  .animate-slide-up {
    animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
</style>

<!-- Background Mesh Gradients -->
<div class="fixed inset-0 -z-10 overflow-hidden bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100">
  <div
    class="absolute -top-40 -left-40 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
  </div>
  <div
    class="absolute top-20 -right-20 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-15">
  </div>
  <div
    class="absolute bottom-0 left-1/3 w-80 h-80 bg-violet-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10">
  </div>
</div>

<main class="min-h-screen w-screen flex flex-col items-center justify-center relative selection:bg-blue-200 px-6">

  <!-- Back Button -->
  <a href="/"
    class="fixed top-8 left-8 flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-colors z-20 font-medium text-sm bg-white/60 backdrop-blur-sm px-4 py-2 rounded-full border border-white/80 shadow-sm hover:shadow">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>

  <!-- Logo & Branding -->

    <!-- Floating Logo -->
    <div

      <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 relative z-10" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m0-6l-9-5m9 5l9-5" />
      </svg>
    </div>

    <h1 class="fade-up-2 text-5xl md:text-6xl font-black text-slate-800 tracking-tight mb-3 leading-tight">
      SPMB SMP N 1 <span class="text-blue-600">Sragen</span>
    </h1>
    <p class="fade-up-3 text-xl text-slate-500 font-medium">Sistem Antrian Terpadu</p>
  </div>

  <!-- Alur Pendaftaran (3 Ruangan) -->

    class="fade-up-3 flex items-center gap-0 mb-12 z-10 bg-white/60 backdrop-blur-sm border border-white/80 rounded-2xl p-4 shadow-lg">

    <div class="slide-in-1 flex items-center gap-3 px-4">

        <span class="text-blue-700 font-black text-sm">I</span>
      </div>
      <div>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tahap 1</p>
        <p class="text-sm font-bold text-slate-700">Ruang Informasi</p>
      </div>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 shrink-0" fill="none" viewBox="0 0 24 24"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>

    <!-- Ruang Akun -->
    <div class="slide-in-2 flex items-center gap-3 px-4">
      <div class="w-9 h-9 rounded-xl bg-violet-100 flex items-center justify-center shrink-0">
        <span class="text-violet-700 font-black text-sm">A</span>
      </div>
      <div>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tahap 2</p>
        <p class="text-sm font-bold text-slate-700">Pembuatan Akun</p>
      </div>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 shrink-0" fill="none" viewBox="0 0 24 24"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>

    <!-- Ruang Input -->
    <div class="slide-in-3 flex items-center gap-3 px-4">
      <div class="w-9 h-9 rounded-xl bg-emerald-100 flex items-center justify-center shrink-0">
        <span class="text-emerald-700 font-black text-sm">D</span>
      </div>
      <div>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tahap 3</p>
        <p class="text-sm font-bold text-slate-700">Input Data</p>

    </div>
  </div>

  <!-- Tombol Ambil Antrian -->
  <div class="z-10 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full mb-10 px-4">

    <!-- Button 1: Ruang Informasi -->
    <button hx-post="/api/queue/generate" hx-vals='{"step": "INFO_ROOM"}' hx-target="#kiosk-modal" hx-swap="innerHTML"
      hx-indicator="#loading-spinner-info" hx-disabled-elt="this"
      class="group relative overflow-hidden bg-gradient-to-br from-blue-500 to-blue-700 text-white p-8 rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(59,130,246,0.5)] transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_25px_60px_-12px_rgba(59,130,246,0.6)] active:translate-y-1 active:shadow-none">
      <!-- Glassmorphic border & light shine -->
      <div class="absolute inset-0 rounded-[2rem] border border-white/20"></div>
      <div
        class="absolute -top-24 -left-24 w-48 h-48 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-500">
      </div>

      <div class="flex flex-col items-center text-center gap-4 relative z-10">
        <!-- Icon -->
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24"

        <!-- Text -->

          <p class="text-blue-100 text-sm mt-1 font-medium">Nomor Seri <strong class="text-white text-base">I</strong>
          </p>
        </div>

        <!-- Arrow & Loading -->
        <div class="flex items-center justify-center mt-2">
          <span
            class="inline-flex items-center gap-1 text-sm font-bold bg-white/20 px-4 py-2 rounded-full group-hover:bg-white/30 transition-colors">
            Cetak Tiket
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </span>
          <svg id="loading-spinner-info" class="htmx-indicator animate-spin h-5 w-5 text-white absolute"

            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
        </div>
      </div>
    </button>

    <!-- Button 2: Ruang Pembuatan Akun -->
    <button hx-post="/api/queue/generate" hx-vals='{"step": "ACCOUNT_ROOM"}' hx-target="#kiosk-modal"

      <div
        class="absolute -top-24 -left-24 w-48 h-48 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-500">

      <div class="flex flex-col items-center text-center gap-4 relative z-10">
        <!-- Icon -->
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24"

          <span
            class="inline-flex items-center gap-1 text-sm font-bold bg-white/20 px-4 py-2 rounded-full group-hover:bg-white/30 transition-colors">
            Cetak Tiket
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform"

            </path>
          </svg>
        </div>

    <button hx-post="/api/queue/generate" hx-vals='{"step": "INPUT_ROOM"}' hx-target="#kiosk-modal" hx-swap="innerHTML"

      <div class="absolute inset-0 rounded-[2rem] border border-white/20"></div>
      <div
        class="absolute -top-24 -left-24 w-48 h-48 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-500">

      <div class="flex flex-col items-center text-center gap-4 relative z-10">
        <!-- Icon -->
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />

        </div>

        <!-- Text -->
        <div>
          <h3 class="text-2xl font-black tracking-tight">Input Data & Verifikasi</h3>
          <p class="text-emerald-100 text-sm mt-1 font-medium">Nomor Seri <strong
              class="text-white text-base">D</strong></p>
        </div>

        <!-- Arrow & Loading -->
        <div class="flex items-center justify-center mt-2">
          <span
            class="inline-flex items-center gap-1 text-sm font-bold bg-white/20 px-4 py-2 rounded-full group-hover:bg-white/30 transition-colors">
            Cetak Tiket
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </span>
          <svg id="loading-spinner-input" class="htmx-indicator animate-spin h-5 w-5 text-white absolute"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
        </div>
      </div>
    </button>

  </div>

  <!-- Instruksi Footer -->
  <p class="text-slate-400 text-base font-medium z-10">
    Pilih dan sentuh tombol di atas sesuai dengan ruangan tujuan Anda
  </p>
