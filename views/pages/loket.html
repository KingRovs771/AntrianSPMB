<!--
    File: views/pages/loket.html
    Variabel Go Template yang diharapkan:
    - {{ .CounterName }}   : String (misal "Loket 1 - Pembuatan Akun")
    - {{ .StaffName }}     : String (misal "Budi Santoso")
    - {{ .CounterID }}     : ID Loket
-->

<!-- Custom CSS kecil khusus untuk scrollbar tabel di halaman ini -->
<style>
  .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>

<div class="bg-slate-50 min-h-screen flex flex-col overflow-hidden w-full">

  <!-- Header Navbar -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
    <div class="flex items-center gap-4">
      <!-- Inisial Loket -->
      <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold shadow-md">
        L1
      </div>
      <div>
        <h1 class="text-xl font-bold text-slate-800 leading-tight">{{ .CounterName }}</h1>
        <p class="text-sm text-slate-500 font-medium">Petugas: {{ .StaffName }}</p>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <!-- Indikator Koneksi HTMX/SSE -->
      <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 rounded-full border border-emerald-100">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
        <span class="text-xs font-bold text-emerald-700">Sistem Online</span>
      </div>

      <!-- Tombol Reset Antrian (Biasanya untuk akhir hari) -->
      <button
              hx-post="/api/queue/reset"
              hx-confirm="🚨 PERHATIAN: Anda akan menghapus SELURUH antrian hari ini. Gunakan hanya jika operasional hari ini benar-benar sudah selesai. Lanjutkan?"
              class="text-orange-600 hover:text-orange-700 font-bold text-xs bg-orange-50 hover:bg-orange-100 px-3 py-1.5 rounded-lg border border-orange-200 transition-all active:scale-95 flex items-center gap-1"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Reset Antrian
      </button>

      <button
              hx-post="/api/auth/logout"
              class="text-slate-500 hover:text-red-500 font-medium text-sm flex items-center gap-1 transition-colors ml-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 flex p-6 gap-6 overflow-hidden w-full">

    <!-- KOLOM KIRI: Panel Kontrol Antrian Aktif -->
    <div class="w-1/3 flex flex-col gap-6">

      <!-- Panel Utama Operasional Loket -->
      <!--
          hx-get ini akan dipanggil otomatis saat halaman diload (trigger="load")
          untuk mengambil status terakhir loket ini dari server.
          Hasilnya akan menggantikan isi div ini dengan partial "active_call.html"
      -->
      <div
              id="active-call-panel"
              hx-get="/api/counter/{{ .CounterID }}/current"
              hx-trigger="load"
              hx-swap="innerHTML"
              class="bg-white rounded-3xl border border-slate-200 p-8 shadow-lg flex-1 flex flex-col relative overflow-hidden"
      >
        <!-- Indikator Loading awal sebelum data dari server masuk -->
        <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
          <svg class="animate-spin h-10 w-10 mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p>Memuat status loket...</p>
        </div>
      </div>

      <!-- Kartu Statistik Mini -->
      <!-- Sama seperti panel di atas, ini akan memuat partial "counter_stats.html" -->
      <div
              id="counter-stats"
              hx-get="/api/counter/{{ .CounterID }}/stats"
              hx-trigger="load, queueUpdated from:body"
              class="grid grid-cols-2 gap-4 shrink-0"
      >
        <!-- Placeholder sebelum data ter-load -->
        <div class="bg-slate-100 rounded-2xl h-24 animate-pulse"></div>
        <div class="bg-slate-100 rounded-2xl h-24 animate-pulse"></div>
      </div>
    </div>

    <!-- KOLOM KANAN: Daftar Antrian Menunggu -->
    <div class="w-2/3 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">

      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Daftar Tunggu
        </h2>
        <div class="relative">
          <!-- Search bar (bisa diintegrasikan dengan HTMX untuk pencarian live) -->
          <input
                  type="text"
                  name="search"
                  placeholder="Cari nomor..."
                  hx-post="/api/counter/{{ .CounterID }}/queue/search"
                  hx-trigger="keyup changed delay:500ms"
                  hx-target="#queue-table-body"
                  class="pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent w-48"
          >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute left-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>

      <!-- Area Tabel Antrian (Scrollable) -->
      <div class="flex-1 overflow-auto p-2 custom-scrollbar">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50 sticky top-0 z-10">
          <tr>
            <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider rounded-tl-lg">No. Antrian</th>
            <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
            <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">Waktu Tiba</th>
            <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider text-right rounded-tr-lg">Aksi</th>
          </tr>
          </thead>

          <!--
              Isi tabel ini akan diperbarui oleh HTMX.
              hx-get dipanggil saat load, dan setiap kali event kustom 'queueUpdated' ditembakkan
              dari SSE atau dari response HTMX lainnya.
          -->
          <tbody
                  id="queue-table-body"
                  hx-get="/api/counter/{{ .CounterID }}/queue/waiting"
                  hx-trigger="load, queueUpdated from:body"
                  class="divide-y divide-slate-100"
          >
          <!-- Skeleton loading untuk baris tabel -->
          <tr><td colspan="4" class="p-4"><div class="h-8 bg-slate-100 rounded animate-pulse"></div></td></tr>
          <tr><td colspan="4" class="p-4"><div class="h-8 bg-slate-100 rounded animate-pulse w-3/4"></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>

  </main>
</div>
