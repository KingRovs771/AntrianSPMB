<!--
    File: views/pages/loket.html
    Variabel Go Template yang diharapkan:
    - {{ .CounterName }}   : String (misal "Loket 1 - Ruang Informasi")
    - {{ .StaffName }}     : String (misal "Budi Santoso")
    - {{ .CounterID }}     : ID Loket
    - {{ .RoomType }}      : Step (INFO_ROOM / ACCOUNT_ROOM / INPUT_ROOM)
    - {{ .RoomLabel }}     : String label ramah (misal "Ruang Informasi")
    - {{ .QueuePrefix }}   : Prefix nomor (I / A / D)
-->

<style>
  /* Scrollbar cantik untuk tabel */
  .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Animasi gradient background header */
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .header-gradient {
    background-size: 200% 200%;
    animation: gradientShift 8s ease infinite;
  }

  /* Warna per ruangan — dikontrol via class di body berdasarkan RoomType */
  .room-info    { --room-from: #2563eb; --room-to: #1d4ed8; --room-accent: #dbeafe; --room-text: #1e40af; }
  .room-account { --room-from: #7c3aed; --room-to: #5b21b6; --room-accent: #ede9fe; --room-text: #5b21b6; }
  .room-input   { --room-from: #059669; --room-to: #047857; --room-accent: #d1fae5; --room-text: #065f46; }
</style>

<!--
  Wrapper utama — tambahkan class ruangan untuk theming warna
  Handler Go harus mengirim class yang tepat via .RoomClass
-->
<div class="bg-slate-100 min-h-screen flex flex-col overflow-hidden w-full {{ .RoomClass }}">

  <!-- ================================================================ -->
  <!-- HEADER NAVBAR PREMIUM                                             -->
  <!-- ================================================================ -->
  <header class="bg-white border-b border-slate-200 px-6 py-0 shadow-sm sticky top-0 z-20">
    <div class="flex items-stretch justify-between h-16">

      <!-- Left: Branding & Info Loket -->
      <div class="flex items-center gap-4">
        <!-- Badge Ruangan dengan warna dinamis -->
        <div class="h-full flex items-center px-5 border-r border-slate-100">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-lg"
               style="background: linear-gradient(135deg, var(--room-from, #2563eb), var(--room-to, #1d4ed8));">
            {{ .QueuePrefix }}
          </div>
        </div>

        <div>
          <h1 class="text-base font-bold text-slate-800 leading-tight">{{ .CounterName }}</h1>
          <p class="text-xs text-slate-500 font-medium flex items-center gap-1.5 mt-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            {{ .StaffName }}
          </p>
        </div>

        <!-- Label Ruangan (Chip) -->
        <div class="hidden md:flex items-center">
          <span class="px-3 py-1 rounded-full text-xs font-bold"
                style="background-color: var(--room-accent, #dbeafe); color: var(--room-text, #1e40af);">
            Melayani: {{ .RoomLabel }}
          </span>
        </div>
      </div>

      <!-- Right: Status & Actions -->
      <div class="flex items-center gap-3">
        <!-- Indikator Online -->
        <div class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 rounded-full border border-emerald-100">
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
          </span>
          <span class="text-xs font-bold text-emerald-700">Live</span>
        </div>

        <!-- Tombol Reset -->
        <button
          hx-post="/api/queue/reset"
          hx-confirm="🚨 Anda akan menghapus SELURUH antrian hari ini. Lanjutkan?"
          class="hidden sm:flex items-center gap-1.5 text-orange-600 hover:text-orange-700 font-bold text-xs bg-orange-50 hover:bg-orange-100 px-3 py-1.5 rounded-lg border border-orange-200 transition-all active:scale-95"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Reset
        </button>

        <!-- Tombol Logout -->
        <button
          hx-post="/api/auth/logout"
          class="flex items-center gap-1.5 text-slate-400 hover:text-rose-500 font-medium text-sm transition-colors px-3 py-1.5 rounded-lg hover:bg-rose-50"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="hidden sm:inline">Keluar</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ================================================================ -->
  <!-- MAIN CONTENT                                                       -->
  <!-- ================================================================ -->
  <main class="flex-1 flex p-5 gap-5 overflow-hidden w-full">

    <!-- ============================== -->
    <!-- KOLOM KIRI: Panel Operasional  -->
    <!-- ============================== -->
    <div class="w-80 shrink-0 flex flex-col gap-5">

      <!-- Panel Antrian Aktif -->
      <div
        id="active-call-panel"
        hx-get="/api/counter/{{ .CounterID }}/current"
        hx-trigger="load"
        hx-swap="innerHTML"
        class="bg-white rounded-3xl border border-slate-200 p-6 shadow-lg flex-1 flex flex-col relative overflow-hidden"
      >
        <!-- Loading skeleton -->
        <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
          <svg class="animate-spin h-8 w-8 mb-3 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p class="text-sm">Memuat status loket...</p>
        </div>
      </div>

      <!-- Kartu Statistik -->
      <div
        id="counter-stats"
        hx-get="/api/counter/{{ .CounterID }}/stats"
        hx-trigger="load, queueUpdated from:body"
        class="grid grid-cols-2 gap-4 shrink-0"
      >
        <div class="bg-slate-200 rounded-2xl h-24 animate-pulse"></div>
        <div class="bg-slate-200 rounded-2xl h-24 animate-pulse"></div>
      </div>

    </div>

    <!-- ============================== -->
    <!-- KOLOM KANAN: Daftar Antrian    -->
    <!-- ============================== -->
    <div class="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col overflow-hidden min-w-0">

      <!-- Header Tabel -->
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <h2 class="text-lg font-bold text-slate-800">Daftar Tunggu</h2>
          <!-- Badge prefix nomor -->
          <span class="px-2.5 py-1 rounded-lg text-xs font-black"
                style="background-color: var(--room-accent, #dbeafe); color: var(--room-text, #1e40af);">
            Seri {{ .QueuePrefix }}–
          </span>
        </div>

        <!-- Search Input -->
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            type="text"
            name="search"
            placeholder="Cari nomor..."
            hx-post="/api/counter/{{ .CounterID }}/queue/search"
            hx-trigger="keyup changed delay:400ms"
            hx-target="#queue-table-body"
            class="pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent w-44 transition-all focus:w-56"
            style="--tw-ring-color: var(--room-from, #2563eb);"
          >
        </div>
      </div>

      <!-- Info bar ruangan -->
      <div class="px-6 py-2.5 bg-slate-50 border-b border-slate-100 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-xs text-slate-500 font-medium">
          Hanya menampilkan antrian <strong class="text-slate-700">{{ .RoomLabel }}</strong> — nomor seri <strong style="color: var(--room-from, #2563eb);">{{ .QueuePrefix }}-XXX</strong>
        </p>
      </div>

      <!-- Tabel Antrian (Scrollable) -->
      <div class="flex-1 overflow-auto custom-scrollbar">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50/80 sticky top-0 z-10 backdrop-blur-sm">
            <tr>
              <th class="py-3 px-6 text-xs font-bold text-slate-400 uppercase tracking-wider">No. Antrian</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-400 uppercase tracking-wider">Status</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-400 uppercase tracking-wider">Waktu Tiba</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Aksi</th>
            </tr>
          </thead>
          <tbody
            id="queue-table-body"
            hx-get="/api/counter/{{ .CounterID }}/queue/waiting"
            hx-trigger="load, queueUpdated from:body"
            class="divide-y divide-slate-50"
          >
            <!-- Skeleton loading -->
            <tr><td colspan="4" class="p-4"><div class="h-10 bg-slate-100 rounded-xl animate-pulse"></div></td></tr>
            <tr><td colspan="4" class="p-4"><div class="h-10 bg-slate-100 rounded-xl animate-pulse w-4/5"></div></td></tr>
            <tr><td colspan="4" class="p-4"><div class="h-10 bg-slate-100 rounded-xl animate-pulse w-3/5"></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

</div>
